version: '3'

vars:
  BINARY_NAME: starterpack-go-cli
  VERSION:
    sh: echo "${VERSION:-dev}"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: >-
    -ldflags "-X github.com/mtfuller/starterpack-go-cli/internal/version.Version={{.VERSION}}
    -X github.com/mtfuller/starterpack-go-cli/internal/version.Commit={{.COMMIT}}
    -X github.com/mtfuller/starterpack-go-cli/internal/version.BuildDate={{.BUILD_DATE}}"

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the binary
    cmds:
      - echo "Building {{.BINARY_NAME}}..."
      - go build {{.LDFLAGS}} -o {{.BINARY_NAME}} main.go
      - echo "Build complete{{":"}} ./{{.BINARY_NAME}}"

  test:
    desc: Run all tests (unit + integration)
    deps: [test-unit, test-integration]

  test-unit:
    desc: Run unit tests only
    cmds:
      - echo "Running unit tests..."
      - go test -v ./internal/... ./pkg/...

  test-integration:
    desc: Run integration tests only
    cmds:
      - echo "Running integration tests..."
      - go test -v ./tests/...

  run:
    desc: Run the application
    cmds:
      - go run main.go

  clean:
    desc: Remove built binaries
    cmds:
      - echo "Cleaning..."
      - rm -f {{.BINARY_NAME}}
      - go clean

  install:
    desc: Install the binary to GOPATH/bin
    cmds:
      - echo "Installing {{.BINARY_NAME}}..."
      - go install {{.LDFLAGS}}
      - echo "Installed to $(go env GOPATH)/bin/{{.BINARY_NAME}}"

  coverage:
    desc: Run tests with coverage
    cmds:
      - echo "Running tests with coverage..."
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated{{":"}} coverage.html"
